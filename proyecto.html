<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso al Proyecto - E‑Taxes Protocol</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f9fafb;
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:#333;
    }
    .login-box{
      background:#fff;
      padding:30px;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
      width:300px;
    }
    h2{
      text-align:center;
      margin-top:0;
      margin-bottom:20px;
    }
    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }
    input[type="text"], input[type="password"]{
      width:100%;
      padding:8px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:4px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:10px;
      background:#0066cc;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
      font-size:14px;
    }
    button:hover{
      background:#004999;
    }
    .error{
      color:#d00;
      margin-top:10px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Acceso al Proyecto</h2>
    <label for="user">Usuario (A, B o C):</label>
    <input type="text" id="user" placeholder="Usuario">
    <label for="pass">Contraseña:</label>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <div id="error" class="error" style="display:none;"></div>
  </div>

  <script>
  // Credenciales simples por colaborador. En un escenario real, esto debería provenir de un back‑end seguro.
  const credentials = {
    'A': 'claveA',
    'B': 'claveB',
    'C': 'claveC'
  };

  function login(){
    var user = document.getElementById('user').value.trim().toUpperCase();
    var pass = document.getElementById('pass').value.trim();
    var errorDiv = document.getElementById('error');
    if(credentials[user] && credentials[user] === pass){
      // Redirigir al colaborador a su vista con el parámetro correspondiente
      window.location.href = 'colaborador.html?colaborador=' + encodeURIComponent(user);
    } else {
      errorDiv.textContent = 'Usuario o contraseña incorrectos';
      errorDiv.style.display = 'block';
    }
  }
  </script>
</body>
</html>
