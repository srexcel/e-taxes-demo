// Mapeo de fechas límite aproximadas por periodo para ordenar las tareas por urgencia.
// Para los periodos sin especificar, se usará una fecha futura lejana.
const dueDates = {
  // Fechas de vencimiento aproximadas para ordenar tareas por urgencia.
  // Los periodos sin especificar se considerarán con vencimiento muy lejano.
  '2024-07': '2024-10-01',
  '2024-08': '2024-11-01',
  '2024-09': '2024-12-01',
  '2024-10': '2025-01-01',
  '2024-11': '2025-02-01',
  '2024-12': '2025-03-01',
  '2025-01': '2025-04-01',
  '2025-02': '2025-05-01',
  '2025-03': '2025-06-01',
  '2025-04': '2025-07-01',
  '2025-05': '2025-08-01',
  '2025-06': '2025-09-01',
  '2025-07': '2025-10-01'
};

// Inicializar la vista según los parámetros de la URL
function init(){
  var params = new URLSearchParams(window.location.search);
  var tareaId = params.get('tarea');
  var collab = params.get('colaborador');
  if(tareaId){
    // Mostrar detalle de la tarea
    renderTaskView(tareaId);
  } else if(collab){
    // Mostrar lista de tareas del colaborador
    renderCollaborator(collab);
  } else {
    document.getElementById('collab-list').style.display='none';
    document.getElementById('task-view').style.display='none';
    var msg = document.createElement('p');
    msg.textContent = 'No se encontró tarea o colaborador en la URL. Ejemplo: ?colaborador=A o ?tarea=t1';
    document.querySelector('.container').appendChild(msg);
  }
}

// Renderizar lista de tareas de un colaborador
function renderCollaborator(collab){
  document.getElementById('task-view').style.display='none';
  var listDiv = document.getElementById('collab-list');
  listDiv.style.display='block';
  var container = document.getElementById('tasks-container');
  container.innerHTML = '';
  // Filtrar tareas por colaborador y ordenarlas por fecha de vencimiento (más urgente primero)
  var tasks = T.filter(function(t){ return t.collaborator === collab; }).sort(function(a,b){
    var da = new Date(dueDates[a.period] || '9999-12-31');
    var db = new Date(dueDates[b.period] || '9999-12-31');
    return da - db;
  });
  if(tasks.length === 0){
    var p = document.createElement('p');
    p.textContent = 'No hay tareas asignadas al colaborador '+collab;
    container.appendChild(p);
    return;
  }
  tasks.forEach(function(t){
    var stLabel = t.status==='completo' ? 'Completo' : t.status==='proceso' ? 'En proceso' : 'Pendiente';
    var card = document.createElement('div');
    card.className = 'task-card';
    // Calcular días restantes basándose en la fecha de vencimiento para el periodo
    var diasTexto = '';
    var due = dueDates[t.period];
    if(due){
      var dDue = new Date(due);
      var diff = Math.ceil((dDue - new Date())/(1000*60*60*24));
      diasTexto = diff >= 0 ? diff + ' días restantes' : 'Vencida';
    }
    card.innerHTML = '<h3>'+t.desc+'</h3>'+
                     '<p><strong>Estado:</strong> '+stLabel+'</p>'+
                     '<p><strong>Fuentes:</strong> '+t.sources.join(', ')+'</p>'+
                     (diasTexto ? '<p><em>'+diasTexto+'</em></p>' : '')+
                     '<button onclick="openTask(\''+t.id+'\')">Ver detalle</button>';
    container.appendChild(card);
  });
}

// Abrir detalle de una tarea
function openTask(id){
  // Reemplazar la búsqueda en la URL manteniendo el colaborador si existe
  var params = new URLSearchParams(window.location.search);
  if(params.has('colaborador')){
    window.location.search = '?tarea='+encodeURIComponent(id)+'&colaborador='+encodeURIComponent(params.get('colaborador'));
  } else {
    window.location.search = '?tarea='+encodeURIComponent(id);
  }
}

// Renderizar vista detallada de la tarea
function renderTaskView(id){
  document.getElementById('collab-list').style.display='none';
  var tv = document.getElementById('task-view');
  tv.style.display = 'block';
  var task = T.find(function(t){ return t.id === id; });
  var detail = document.getElementById('task-detail');
  if(!task){
    detail.innerHTML = '<p>No se encontró la tarea.</p>';
    return;
  }
  var stLabel = task.status==='completo' ? 'Completo' : task.status==='proceso' ? 'En proceso' : 'Pendiente';
  var filesHtml = '';
  if(task.files && task.files.length){
    filesHtml = '<p><strong>Archivos:</strong> <span class="file-tags">'+task.files.map(function(f){return '<span>'+f+'</span>';}).join('')+'</span></p>';
  }
  detail.innerHTML = '<h2>'+task.desc+'</h2>'+
                     '<p><strong>Responsable:</strong> '+task.collaborator+'</p>'+
                     '<p><strong>Estado:</strong> '+stLabel+'</p>'+
                     '<p><strong>Fuentes:</strong> '+task.sources.join(', ')+'</p>'+
                     filesHtml+
                     (task.notes ? '<p><strong>Observaciones:</strong> '+task.notes+'</p>' : '')+
                     '<p><label><strong>Subir archivo:</strong> <input type="file"></label></p>';
}

// Volver a la lista de tareas conservando el colaborador en la URL
function backToList(){
  var params = new URLSearchParams(window.location.search);
  if(params.has('colaborador')){
    window.location.search = '?colaborador='+encodeURIComponent(params.get('colaborador'));
  } else {
    window.location.search = '';
  }
}

window.onload = init;
</script>
